<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sistema de RH</title>
</head>

<body>
    <h1>Cadastrar Funcionário</h1>
    <div>
        <label for="deleteId">ID (matrícula) do funcionário:</label>
        <input type="number" id="deleteId" name="deleteId" placeholder="Digite o ID para remover">
        <button id="btnDeletar" type="button">Remover Funcionário</button>
    </div>
    <br>
    <form id="formFunc">
        <label>Nome:</label>
        <input type="text" id="nome" name="nome" required placeholder="Digite o nome"><br><br>

        <label>Setor:</label>
        <input type="text" id="setor" name="setor" required placeholder="Digite o setor"><br><br>

        <label>Email:</label>
        <input type="email" id="email" name="email" required placeholder="Digite o email"><br><br>

        <label>Salario:</label>
        <input type="text" id="salario" name="salario" required placeholder="Digite o salario"><br><br>

        <label>senha</label>
        <input type="password" id="senha" name="senha" required placeholder="Digite a senha"><br><br>

        <button type="submit">Salvar</button>

    </form>

    <div id = "msg"></div>
    <br><br>
    <button id="btnMostrar">Mostrar Funcionários</button>
    <div id="listaFunc"></div>
    <br><br>
    <script src="Front.js"></script>

    
</body>
</html>
